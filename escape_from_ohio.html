<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escape from Ohio: Cyber Edition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Orbitron', monospace;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: block;
    }

    canvas {
      display: block;
      image-rendering: auto; 
    }

    #runtime-error {
      position: fixed;
      left: 10px;
      bottom: 10px;
      max-width: calc(100vw - 20px);
      padding: 8px 10px;
      font: 14px monospace;
      color: #fff;
      background: rgba(180, 0, 0, 0.9);
      border: 1px solid #ff8080;
      display: none;
      z-index: 9999;
      white-space: pre-wrap;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="runtime-error"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js" crossorigin="anonymous"></script>
  <script>
    // ------------------------------------------------------------
    // Constants
    // ------------------------------------------------------------
    const GAME_WIDTH = 800;
    const GAME_HEIGHT = 600;
    const GROUND_TOP = GAME_HEIGHT * 0.85;
    const PLAYER_X = GAME_WIDTH * 0.15;
    const TARGET_DISTANCE = 5000; // 5 kilometres
    const SAVE_KEY = "escape_from_ohio_best_metres";

    // Runtime error helper
    window.addEventListener("error", (event) => {
      const box = document.getElementById("runtime-error");
      if (box) {
        box.style.display = "block";
        box.textContent = "Runtime error:\n" + (event.error && event.error.stack ? event.error.stack : event.message);
      }
    });

    function getBestDistance() {
      try {
        const v = Number(localStorage.getItem(SAVE_KEY));
        if (Number.isFinite(v) && v >= 0) return v;
      } catch (_e) {}
      return 0;
    }

    function saveBestDistance(currentDistance) {
      const best = getBestDistance();
      const next = Math.max(best, currentDistance);
      try {
        localStorage.setItem(SAVE_KEY, String(next));
      } catch (_e) {}
      return next;
    }

    function bindMenuInput(scene, startFn) {
      const spaceKey = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
      scene.input.on("pointerdown", startFn);

      const zone = scene.add.zone(0, 0, GAME_WIDTH, GAME_HEIGHT).setOrigin(0).setInteractive();
      zone.on("pointerdown", startFn);

      const domHandler = (e) => {
        if (e.code === "Space" || e.key === " ") {
          e.preventDefault();
          startFn();
        }
      };
      window.addEventListener("keydown", domHandler, { passive: false });

      scene.events.once("shutdown", () => {
        scene.input.off("pointerdown", startFn);
        zone.destroy();
        window.removeEventListener("keydown", domHandler);
      });

      return spaceKey;
    }

    // ------------------------------------------------------------
    // Procedural Synthwave/Cyber Textures
    // ------------------------------------------------------------
    function createSharedTextures(scene) {
      const g = scene.make.graphics({ x: 0, y: 0, add: false });

      // Far City Silhouette
      if (!scene.textures.exists("farCityTex")) {
        g.clear();
        for(let i=0; i<40; i++) {
          let w = Phaser.Math.Between(30, 80);
          let h = Phaser.Math.Between(50, 180);
          let x = i * 45;
          let type = Phaser.Math.Between(0, 2); // 0=rect, 1=spire, 2=slanted
          
          g.fillStyle(0x0a001a, 1);
          if (type === 1) { // Spire
             g.fillTriangle(x-5, 200-h, x+w+5, 200-h, x+w/2, 200-h-35);
             g.fillRect(x, 200 - h, w, h);
             // Consistency fix: Red light on Far City Spire
             g.fillStyle(0xff0000, 1);
             g.fillCircle(x + w/2, 200 - h - 35, 1.5);
          } else if (type === 2) { // Slanted
             g.fillTriangle(x, 200-h, x+w, 200-h, x+w, 200-h-20);
             g.fillRect(x, 200 - h, w, h);
          } else {
             g.fillRect(x, 200 - h, w, h);
          }

          // Edge highlight (Neon Rim)
          g.lineStyle(2, 0x00ffff, 0.15);
          g.strokeRect(x, 200 - h, w, h);

          // Better windows
          g.fillStyle(0x00ffff, 0.3);
          for(let wy=200-h+20; wy<190; wy+=15) {
             for(let wx=x+8; wx<x+w-8; wx+=12) {
                if(Math.random()>0.7) g.fillRect(wx, wy, 4, 8);
             }
          }
        }
        g.generateTexture("farCityTex", 1800, 200);
      }

      // Mid City glowing lines
      if (!scene.textures.exists("midCityTex")) {
        g.clear();
        for(let i=0; i<30; i++) {
          let w = Phaser.Math.Between(70, 160);
          let h = Phaser.Math.Between(120, 240);
          let x = i * 110;
          
          // Outer shell with subtle paneling
          g.fillStyle(0x050011, 1);
          g.fillRect(x, 250 - h, w, h);
          
          // Structural detailing (panelling)
          g.lineStyle(1, 0x1a0033, 1);
          for(let px = x + 15; px < x + w; px += 25) {
             g.beginPath(); g.moveTo(px, 250 - h); g.lineTo(px, 250); g.strokePath();
          }
          for(let py = 250 - h + 25; py < 250; py += 45) {
             g.beginPath(); g.moveTo(x, py); g.lineTo(x + w, py); g.strokePath();
          }

          // Tiered roof / Spire / Antenna
          let roofType = Phaser.Math.Between(0, 2);
          g.fillStyle(0x050011, 1);
          if (roofType === 1) { // Tiered
             g.fillRect(x + w*0.2, 250 - h - 15, w*0.6, 15);
             g.lineStyle(2, 0xff00aa, 0.3);
             g.strokeRect(x + w*0.2, 250 - h - 15, w*0.6, 15);
             // Add a small antenna light on tiers too
             g.fillStyle(0xff0000, 1);
             g.fillCircle(x + w/2, 250 - h - 15, 2);
          } else if (roofType === 2) { // Antenna
             g.lineStyle(2, 0xaaaaaa, 0.8);
             g.beginPath(); g.moveTo(x + w/2, 250 - h); g.lineTo(x + w/2, 250 - h - 40); g.strokePath();
             g.fillStyle(0xff0000, 1);
             g.fillCircle(x + w/2, 250 - h - 40, 3); // Guaranteed red light
          }
          
          // Accent glow lines
          g.lineStyle(2, 0xff00aa, 0.4);
          g.beginPath(); g.moveTo(x, 250-h); g.lineTo(x, 250); g.strokePath();
          g.beginPath(); g.moveTo(x+w, 250-h); g.lineTo(x+w, 250); g.strokePath();
          
          // Better Window Patterns
          g.fillStyle(0x00ffff, 0.2);
          for(let wy=250-h+30; wy<240; wy+=22) {
             for(let wx=x+12; wx<x+w-12; wx+=18) {
                if(Math.random()>0.6) g.fillRect(wx, wy, 10, 5);
             }
          }

          // Neon Signage Procedural
          if (Math.random() > 0.4) {
             let signY = 250 - h + Phaser.Math.Between(20, 70);
             let signColor = Phaser.Math.RND.pick([0xff00aa, 0x00ffff, 0xffff00]);
             g.fillStyle(signColor, 0.15);
             g.fillRect(x + w/4 - 3, signY - 2, w/2 + 6, 14); // Glow box
             g.fillStyle(signColor, 0.8);
             g.fillRect(x + w/4, signY, w/2, 10);
          }
        }
        g.generateTexture("midCityTex", 3300, 250);
      }

      // Synth Grid Map
      if (!scene.textures.exists("synthGridTex")) {
        g.clear();
        // Base Grid
        g.lineStyle(2, 0x00ffff, 0.3);
        g.strokeRect(0, 0, 100, 100);
        
        // Technonodes at intersections
        g.fillStyle(0x00ffff, 0.7);
        g.fillRect(0, 0, 4, 4);
        g.fillRect(96, 0, 4, 4);
        g.fillRect(0, 96, 4, 4);
        g.fillRect(96, 96, 4, 4);
        
        // Horizontal secondary line for perspective fake
        g.lineStyle(1, 0x00ffff, 0.1);
        g.beginPath(); g.moveTo(0, 50); g.lineTo(100, 50); g.strokePath();
        
        g.generateTexture("synthGridTex", 100, 100);
      }

      // Obstacle 1: Sus Vent
      if (!scene.textures.exists("obsVent")) {
        g.clear();
        g.fillStyle(0x333333, 1);
        g.fillRect(5, 50, 70, 10);
        g.lineStyle(2, 0xaaaaaa, 1);
        g.strokeRect(5, 50, 70, 10);
        g.fillStyle(0x555555, 1);
        g.fillRect(10, 10, 10, 40);
        g.strokeRect(10, 10, 10, 40);
        // Red glowing vent grating eyes
        g.fillStyle(0xff0000, 1);
        g.fillRect(30, 52, 6, 6);
        g.fillRect(45, 52, 6, 6);
        g.generateTexture("obsVent", 80, 60);
      }

      // Obstacle 2: Spicy Wires
      if (!scene.textures.exists("obsWires")) {
        g.clear();
        g.lineStyle(4, 0xff0044, 1);
        g.beginPath(); g.moveTo(10,0); g.lineTo(30, 40); g.strokePath();
        g.lineStyle(4, 0x00ffff, 1);
        g.beginPath(); g.moveTo(30,0); g.lineTo(15, 60); g.strokePath();
        g.lineStyle(4, 0xffff00, 1);
        g.beginPath(); g.moveTo(50,0); g.lineTo(40, 50); g.strokePath();
        g.fillStyle(0xffffff, 1);
        g.fillCircle(15, 60, 5); // spark
        g.generateTexture("obsWires", 60, 80);
      }

      // Finish Portal: EXIT
      if (!scene.textures.exists("finishPortal")) {
        g.clear();
        // Left pillar
        g.fillStyle(0x0a001a, 1);
        g.fillRect(0, 0, 20, 180);
        g.lineStyle(4, 0x00ffff, 1);
        g.strokeRect(0, 0, 20, 180);
        // Right pillar
        g.fillStyle(0x0a001a, 1);
        g.fillRect(100, 0, 20, 180);
        g.lineStyle(4, 0x00ffff, 1);
        g.strokeRect(100, 0, 20, 180);
        // Central Energy Flow
        g.fillStyle(0x00ffff, 0.2);
        g.fillRect(20, 20, 80, 140);
        for(let i=0; i<5; i++) {
           g.fillStyle(0x00ffff, 0.4);
           g.fillRect(20, 30 + i*25, 80, 2);
        }
        g.generateTexture("finishPortal", 120, 180);
      }

      // Security Digit Sign
      if (!scene.textures.exists("dataSign")) {
        g.clear();
        g.fillStyle(0x050011, 0.9);
        g.fillRect(0, 0, 80, 100);
        g.lineStyle(4, 0x00ffff, 1);
        g.strokeRect(0, 0, 80, 100);
        g.generateTexture("dataSign", 80, 100);
      }

      // Keypad Button Square
      if (!scene.textures.exists("keypadSquare")) {
        g.clear();
        g.fillStyle(0x0a001a, 1);
        g.fillRect(0, 0, 60, 60);
        g.lineStyle(3, 0x00ffff, 1);
        g.strokeRect(0, 0, 60, 60);
        g.generateTexture("keypadSquare", 60, 60);
      }

      // Obstacle 3: Ejected Trash
      if (!scene.textures.exists("obsTrash")) {
        g.clear();
        g.fillStyle(0x443322, 1);
        g.fillRect(20, 30, 40, 40); 
        g.lineStyle(2, 0xaa8800, 1);
        g.strokeRect(20, 30, 40, 40);
        g.fillStyle(0x888888, 1);
        g.fillCircle(15, 60, 15); 
        g.fillStyle(0x44aa44, 1);
        g.fillRect(50, 20, 15, 35); 
        g.generateTexture("obsTrash", 80, 80);
      }

      // Obstacle 4: Sus Drone
      if (!scene.textures.exists("obsSus")) {
        g.clear();
        g.fillStyle(0xff0033, 1);
        g.fillRoundedRect(10, 10, 30, 45, 15);
        g.fillStyle(0x990011, 1);
        g.fillRoundedRect(0, 15, 15, 25, 5);
        g.fillStyle(0x00ffff, 1);
        g.fillRoundedRect(18, 18, 22, 12, 6);
        g.fillStyle(0xffffff, 1);
        g.fillRect(32, 20, 4, 4);
        g.fillStyle(0xffaa00, 1);
        g.fillTriangle(15, 55, 35, 55, 25, 70);
        g.generateTexture("obsSus", 50, 75);
      }

      g.destroy();
    }

    // ------------------------------------------------------------
    // Menu Scene
    // ------------------------------------------------------------
    class MenuScene extends Phaser.Scene {
      constructor() {
        super("MenuScene");
      }

      preload() {
        this.load.audio('music_drip', 'assets/sounds/music_drip.mp3');
        this.load.audio('sfx_meeting', 'assets/sounds/sfx_meeting.mp3');
        this.load.audio('sfx_kill', 'assets/sounds/sfx_kill.mp3');
        this.load.audio('sfx_victory', 'assets/sounds/sfx_victory.mp3');
        this.load.audio('sfx_alert', 'assets/sounds/sfx_alert.mp3');
        this.load.audio('sfx_sabotage', 'assets/sounds/sfx_sabotage.mp3');
      }

      create() {
        this.cameras.main.setBackgroundColor("#050011");
        
        // Start Background Music (Looped) - Safe check for local file restrictions
        try {
            let bgm = this.sound.get('music_drip');
            if (!bgm) {
                bgm = this.sound.add('music_drip', { loop: true, volume: 0.6 });
            }
            if (bgm && !bgm.isPlaying) {
                bgm.play();
            }
        } catch (e) { console.warn("Audio Context blocked or file missing:", e); }

        // Meeting Start Sound - Safe play with Autoplay Bypass
        const playMeetingIfReady = () => {
            if (this.cache.audio.exists('sfx_meeting')) {
                this.sound.play('sfx_meeting', { volume: 0.8 });
            }
        };

        // Try playing immediately
        playMeetingIfReady();

        // One-time interaction listener to bypass browser audio block
        this.input.once('pointerdown', playMeetingIfReady);
        window.addEventListener('keydown', playMeetingIfReady, { once: true });

        // Background decorative lines
        const g = this.add.graphics();
        g.lineStyle(2, 0xff00aa, 0.2);
        for(let i=0; i<GAME_HEIGHT; i+=40) {
           g.beginPath(); g.moveTo(0, i); g.lineTo(GAME_WIDTH, i); g.strokePath();
        }

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.2, "ESCAPE FROM OHIO", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "64px",
          fontStyle: "900",
          color: "#00ffff"
        }).setOrigin(0.5).setShadow(0, 0, "#00deff", 20, true, true);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.32, "POLUS RUN: SUS EDITION", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "22px",
          color: "#ff00aa"
        }).setOrigin(0.5).setShadow(0, 0, "#ff00aa", 10, true, true);

        // CLEARLY INDICATING THE GOAL
        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.48, `🎯 TARGET: 5000 METRES`, {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "36px",
          fontStyle: "700",
          color: "#ffffff"
        }).setOrigin(0.5).setShadow(0, 0, "#ffffff", 10, true, true);

        const prompt = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.65, "[ PRESS SPACE OR TAP TO ENGAGE ]", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "26px",
          fontStyle: "700",
          color: "#ffcc00"
        }).setOrigin(0.5);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.8, `PREVIOUS BEST: ${getBestDistance().toFixed(1)} M`, {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "20px",
          color: "#8888aa"
        }).setOrigin(0.5);

        this.tweens.add({
          targets: prompt,
          alpha: 0.1,
          duration: 800,
          yoyo: true,
          repeat: -1
        });

        this.started = false;
        this.startGame = () => {
          if (this.started) return;
          this.started = true;
          this.cameras.main.fadeOut(300, 0, 0, 0);
          this.cameras.main.once('camerafadeoutcomplete', () => {
             this.scene.start("GameScene");
          });
        };

        this.spaceKey = bindMenuInput(this, this.startGame);
      }

      update() {
        if (this.spaceKey && Phaser.Input.Keyboard.JustDown(this.spaceKey)) {
          this.startGame();
        }
      }
    }

    // ------------------------------------------------------------
    // Game Scene
    // ------------------------------------------------------------
    class GameScene extends Phaser.Scene {
      constructor() {
        super("GameScene");
      }

      preload() {
        // Redundant preloads are ignored by Phaser but ensure assets are ready
        this.load.audio('music_drip', 'assets/sounds/music_drip.mp3');
        this.load.audio('sfx_meeting', 'assets/sounds/sfx_meeting.mp3');
        this.load.audio('sfx_kill', 'assets/sounds/sfx_kill.mp3');
        this.load.audio('sfx_victory', 'assets/sounds/sfx_victory.mp3');
        this.load.audio('sfx_alert', 'assets/sounds/sfx_alert.mp3');
        this.load.audio('sfx_sabotage', 'assets/sounds/sfx_sabotage.mp3');
      }

      create() {
        createSharedTextures(this);
        
        // --- 1. PREMIUM PARALLAX BACKGROUND ---
        
        // Deep purple to black gradient sky
        let sky = this.add.graphics();
        sky.fillGradientStyle(0x0a001a, 0x0a001a, 0x3d004a, 0x3d004a, 1, 1, 1, 1);
        sky.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        // Slow moving stars stream
        this.stars = [];
        let starTex = this.add.graphics();
        starTex.fillStyle(0xffffff, 1);
        starTex.fillCircle(2, 2, 2);
        starTex.generateTexture('star', 4, 4);
        starTex.destroy();

        for(let i=0; i<80; i++) {
          let s = this.add.image(Phaser.Math.Between(0, GAME_WIDTH), Phaser.Math.Between(0, GROUND_TOP-50), 'star').setDepth(0);
          s.alpha = Phaser.Math.FloatBetween(0.2, 0.9);
          s.scale = Phaser.Math.FloatBetween(0.4, 1.2);
          s.speed = Phaser.Math.FloatBetween(1, 4);
          this.stars.push(s);
        }

        // Retro Synthwave Sun
        let sunGlow = this.add.circle(GAME_WIDTH/2, GROUND_TOP - 160, 160, 0xff0066, 0.4).setDepth(0);
        let sun = this.add.circle(GAME_WIDTH/2, GROUND_TOP - 160, 140, 0xff0066).setDepth(0);
        let sunCuts = this.add.graphics().setDepth(0);
        sunCuts.fillStyle(0x3d004a, 1);
        for(let i=0; i<12; i++) {
           sunCuts.fillRect(0, GROUND_TOP - 100 + i*16, GAME_WIDTH, 3 + i*1.5);
        }

        // Layered Cities
        this.farCity = this.add.tileSprite(GAME_WIDTH/2, GROUND_TOP - 100, GAME_WIDTH, 200, "farCityTex").setDepth(1);
        this.midCity = this.add.tileSprite(GAME_WIDTH/2, GROUND_TOP - 125, GAME_WIDTH, 250, "midCityTex").setDepth(2);

        // Synthwave Ground Floor
        const floorHeight = GAME_HEIGHT - GROUND_TOP;
        this.groundVisual = this.add.tileSprite(GAME_WIDTH/2, GROUND_TOP + floorHeight/2, GAME_WIDTH, floorHeight, "synthGridTex").setDepth(3);
        this.groundVisual.setBlendMode('ADD');

        // Dark fade overlay spanning top of the ground to add perspective depth
        let fade = this.add.graphics().setDepth(4);
        fade.fillGradientStyle(0x3d004a, 0x3d004a, 0x3d004a, 0x3d004a, 1, 1, 0, 0);
        fade.fillRect(0, GROUND_TOP, GAME_WIDTH, 50);

        // --- 2. PHYSICS & HUD ---
        
        // Physics ground (invisible)
        this.ground = this.add.rectangle(GAME_WIDTH / 2, GROUND_TOP + 40, GAME_WIDTH, 80, 0x00ff00, 0);
        this.physics.add.existing(this.ground, true);

        // Player physics hitbox 
        this.player = this.add.rectangle(PLAYER_X, GROUND_TOP - 40, 24, 80, 0xffffff, 0);
        this.physics.add.existing(this.player);
        this.playerBody = this.player.body;
        this.playerBody.setGravityY(1800);
        this.playerBody.setCollideWorldBounds(true);
        this.playerBody.setSize(24, 80);
        this.physics.add.collider(this.player, this.ground);

        // --- 3. PREMIUM ANIMATED PLAYER SKELETON ---
        
        this.playerVisual = this.add.container(PLAYER_X, GROUND_TOP - 40).setDepth(20);
        const pColor = 0xffffff;

        const createPart = (cx, cy, w, h, colorMain, isBack) => {
            let cont = this.add.container(cx, cy);
            let vis = this.add.graphics();
            let neonColor = isBack ? 0x008888 : 0x00ffff; // Back limbs are darker
            
            // Base shadow shape
            vis.fillStyle(0x050505, 1);
            vis.fillRoundedRect(-w/2, 0, w, h, w/3);
            // Neon Glow aura
            vis.lineStyle(6, neonColor, 0.4);
            vis.strokeRoundedRect(-w/2, 0, w, h, w/3);
            // Core hard line
            vis.lineStyle(2, 0xffffff, 0.9);
            vis.strokeRoundedRect(-w/2, 0, w, h, w/3);
            // Internal conduit
            vis.lineStyle(1, neonColor, 1);
            vis.beginPath(); vis.moveTo(0, 4); vis.lineTo(0, h-4); vis.strokePath();

            cont.add(vis);
            return cont;
        };

        // Assemble hierarchy - sizes adjusted to fit tight 80px hitbox visually
        this.bArm = createPart(0, -10, 8, 16, pColor, true); 
        this.bArmLower = createPart(0, 14, 6, 16, pColor, true); 
        this.bArm.add(this.bArmLower);

        this.bLeg = createPart(0, 5, 10, 22, pColor, true); 
        this.bLegLower = createPart(0, 20, 8, 22, pColor, true); 
        this.bLeg.add(this.bLegLower);

        this.torso = createPart(0, -15, 16, 26, pColor, false);

        this.head = this.add.container(0, -25);
        let hV = this.add.graphics();
        hV.fillStyle(0x050505, 1); hV.fillCircle(0, 0, 10);
        hV.lineStyle(4, 0x00ffff, 0.4); hV.strokeCircle(0, 0, 10); // glow
        hV.lineStyle(2, 0xffffff, 0.9); hV.strokeCircle(0, 0, 10); // core
        hV.fillStyle(0xff00aa, 1); hV.fillRect(1, -3, 8, 4); // sci-fi visor
        this.head.add(hV);

        this.fLeg = createPart(0, 5, 12, 22, pColor, false);
        this.fLegLower = createPart(0, 20, 10, 22, pColor, false);
        this.fLeg.add(this.fLegLower);

        this.fArm = createPart(0, -10, 10, 16, pColor, false);
        this.fArmLower = createPart(0, 14, 8, 16, pColor, false);
        this.fArm.add(this.fArmLower);

        this.playerVisual.add([this.bArm, this.bLeg, this.torso, this.head, this.fLeg, this.fArm]);

        // --- 4. CINEMATIC UI ---
        
        let topBar = this.add.rectangle(GAME_WIDTH/2, 20, GAME_WIDTH, 40, 0x000000, 0.8).setDepth(100);
        this.distance = 0;
        this.distanceText = this.add.text(20, 20, "DIST: 0M", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "24px",
          fontStyle: "900",
          color: "#00ffff"
        }).setDepth(101).setShadow(0, 0, "#00deff", 10, true, true);

        // Progress Bar to 5000m
        this.progressBorder = this.add.graphics().setDepth(100);
        this.progressBorder.lineStyle(2, 0xffffff, 0.8);
        this.progressBorder.strokeRect(GAME_WIDTH/2 - 100, 25, 200, 15);
        this.progressBar = this.add.graphics().setDepth(100);
        
        this.speedText = this.add.text(GAME_WIDTH - 20, 20, "VELOCITY: 350 MPH", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "20px",
          fontStyle: "700",
          color: "#00ffff"
        }).setOrigin(1, 0).setDepth(101).setShadow(0, 0, "#00deff", 10, true, true);
        
        // Relocated the extra info to bottom corners to unclutter sky
        this.add.text(20, GAME_HEIGHT - 25, "SYSTEM: POLUS // AMONG US PROXY", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "14px",
          color: "#ff00aa"
        }).setOrigin(0, 0.5).setDepth(101);
        
        this.speedAlert = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.25, "⚠ OVERCLOCKING ⚠\nSPEED INCREASING!", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "26px",
          fontStyle: "900",
          color: "#ffaa00",
          align: "center"
        }).setOrigin(0.5).setAlpha(0).setDepth(105).setShadow(0, 0, "#ff4400", 20, true, true);

        this.spawnAlert = this.add.text(GAME_WIDTH / 2, 110, "", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "24px",
          fontStyle: "900",
          color: "#ff0044"
        }).setOrigin(0.5).setDepth(102).setAlpha(0).setShadow(0, 0, "#ff0044", 20, true, true);

        // --- 5. OBSTACLES ---
        
        this.obstacleDefs = [
          { key: "obsVent", name: "Sus Vent", label: "SABOTAGED VENT", color: "#ff4d4d", hitW: 60, hitH: 40, yOff: 0 },
          { key: "obsWires", name: "Spicy Wires", label: "ELECTRICAL HAZARD", color: "#ffff00", hitW: 30, hitH: 70, yOff: 0 },
          { key: "obsTrash", name: "Ejected Debris", label: "EJECTED GARBAGE", color: "#c47dff", hitW: 55, hitH: 55, yOff: -20 },
          { key: "obsSus", name: "Impostor Drone", label: "IMPOSTOR DETECTED", color: "#ff0000", hitW: 35, hitH: 110, yOff: -85 }
        ];

        this.obstacleGroup = this.physics.add.group({
          allowGravity: false,
          immovable: true
        });
        this.obstacles = [];
        this.physics.add.overlap(this.player, this.obstacleGroup, this.hitObstacle, null, this);

        // --- 6. SECURITY & ENDGAME PORTAL ---
        this.securityCode = Array.from({length: 4}, () => Phaser.Math.Between(0, 9));
        this.signMarkers = [1000, 2000, 3000, 4000];
        this.signsSpawned = [false, false, false, false];
        this.securitySigns = []; // to track moving signs

        this.portalSpawned = false;
        this.portalReached = false;
        this.finishPortal = null;
        this.portalText = null;
        
        // Terminal State
        this.terminalActive = false;
        this.terminalAttempt = [];
        this.terminalTimer = 0;
        this.terminalElements = []; // UI components for cleanup
        this.keypadLocked = false; 
        this.keypadFeedbackTimer = null;

        // Input Setup
        this.jumpQueuedMs = 9999;
        this.isSliding = false;
        
        this.cursors = this.input.keyboard.createCursorKeys();
        this.keyS = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S);
        
        // Mobile tap bridging (handled dynamically in update loop via activePointers, but we keep default block here)

        this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        this.spaceKey.on("down", () => { this.jumpQueuedMs = 0; });
        this.domJump = (e) => {
          if (e.code === "Space" || e.key === " " || e.code === "ArrowUp") {
            e.preventDefault();
            this.jumpQueuedMs = 0;
          }
          if (e.code === "ArrowDown") {
            e.preventDefault(); // stop page scrolling natively
          }
        };
        window.addEventListener("keydown", this.domJump, { passive: false });

        this.events.once("shutdown", () => {
          this.spaceKey.off("down");
          window.removeEventListener("keydown", this.domJump);
        });

        // Gameplay state
        this.runTimeMs = 0;
        this.worldSpeed = 350;
        this.currentSpeedTier = 0;
        this.spawnProgressPx = 0;
        this.nextSpawnGap = Phaser.Math.Between(800, 1100);
        this.nextMilestone = 1000; // Notify per km
        this.ending = false;
      }

      spawnObstacle() {
        let maxCount = 1;
        if (this.distance > 2500) maxCount = 3;
        else if (this.distance > 1000) maxCount = 2;
        
        let patternRoll = Math.random();
        let obsCount = 1;
        if (maxCount === 2) {
           obsCount = patternRoll > 0.4 ? 2 : 1; 
        } else if (maxCount === 3) {
           if (patternRoll > 0.6) obsCount = 3;
           else if (patternRoll > 0.3) obsCount = 2;
           else obsCount = 1;
        }

        let baseX = GAME_WIDTH + 150;
        let curX = baseX;
        let groupNames = [];

        for(let i=0; i<obsCount; i++) {
            let d;
            
            // Allow Impostor to appear at any time, but weight it slightly lower as a solo threat
            let rng = Math.random();
            if (i > 0) {
                // Secondary/Tertiary obstacles have high chance to be Imposters
                d = rng > 0.5 ? this.obstacleDefs.find(x => x.key === "obsSus") : Phaser.Utils.Array.GetRandom(this.obstacleDefs);
            } else {
                // Primary obstacle: Random, but Imposter has a dedicated 25% chance
                d = rng < 0.25 ? this.obstacleDefs.find(x => x.key === "obsSus") : Phaser.Utils.Array.GetRandom(this.obstacleDefs.filter(x => x.key !== "obsSus"));
            }
            
            let finalYOff = d.yOff;
            if (d.key === "obsSus") {
                finalYOff = -60; 
            } else if (d.key === "obsTrash") {
                finalYOff = Phaser.Math.Between(-60, -10); 
            }
            
            const y = GROUND_TOP + finalYOff;
            const s = this.obstacleGroup.create(curX, y, d.key);
            s.setOrigin(0.5, 1);
            s.setDepth(15);
            s.body.allowGravity = false;
            s.body.immovable = true;
            s.body.setSize(d.hitW, d.hitH);
            s.body.setOffset((s.width - d.hitW) * 0.5, s.height - d.hitH);

            const label = this.add.text(curX, y - s.displayHeight - 20, d.label, {
              fontFamily: "Orbitron, sans-serif",
              fontSize: "14px",
              fontStyle: "700",
              color: d.color
            }).setOrigin(0.5, 1).setDepth(16).setShadow(0, 0, d.color, 10, true, true);

            if (d.key === "obsTrash") {
              this.tweens.add({ targets: s, angle: "+=360", duration: 800, repeat: -1, ease: "Linear" });
            } else if (d.key === "obsWires") {
              this.tweens.add({ targets: s, alpha: 0.5, duration: 80, yoyo: true, repeat: -1 }); 
            } else if (d.key === "obsSus") {
              this.tweens.add({ targets: s, y: y - 20, duration: 500, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
            }

            this.obstacles.push({ sprite: s, label: label, name: d.name });
            if(i === 0) groupNames.push(d.name); // only notify primary threat
            
            // Advance horizontal space for next obstacle in group
            curX += Phaser.Math.Between(450, 600); 
        }

        this.showSpawnAlert(groupNames[0] + (obsCount > 1 ? " GROUP" : ""));
        if (this.cache.audio.exists('sfx_alert')) {
            this.sound.play('sfx_alert', { volume: 0.5 });
        }
        
        return curX - baseX;
      }

      showSpawnAlert(name) {
        this.spawnAlert.setText(`⚠ WARNING: ${name.toUpperCase()} APPROACHING`);
        this.spawnAlert.setAlpha(1);
        this.tweens.killTweensOf(this.spawnAlert);
        this.tweens.add({
          targets: this.spawnAlert,
          alpha: 0,
          y: 70,
          duration: 1800,
          ease: "Cubic.easeOut"
        });
      }

      showMilestone() {
        const t = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.35, `SYSTEM SYNC: ${this.distance.toFixed(0)} M`, {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "44px",
          fontStyle: "900",
          color: "#ff00aa"
        }).setOrigin(0.5).setDepth(105).setShadow(0, 0, "#ff00aa", 25, true, true);

        this.tweens.add({
          targets: t,
          y: GAME_HEIGHT * 0.25,
          alpha: 0,
          scale: 1.2,
          duration: 1500,
          ease: "Quad.easeOut",
          onComplete: () => t.destroy()
        });
      }

      hitObstacle() {
        if (this.ending) return;
        this.ending = true;
        this.physics.pause();
        this.cameras.main.flash(400, 255, 0, 0);
        this.cameras.main.shake(500, 0.03);
        if (this.cache.audio.exists('sfx_kill')) {
            this.sound.play('sfx_kill'); 
        }
        const best = saveBestDistance(this.distance);
        
        // Break limbs apart for visual death
        this.playerVisual.each(part => {
             this.tweens.add({
                 targets: part,
                 x: Phaser.Math.Between(-50, 50),
                 y: Phaser.Math.Between(-50, 50),
                 angle: Phaser.Math.Between(-180, 180),
                 alpha: 0.2,
                 duration: 700
             });
        });

        this.time.delayedCall(1000, () => {
          this.scene.start("DeathScene", { distance: this.distance, bestDistance: best });
        });
      }

      update(_t, delta) {
        if (this.ending) {
          // death animation updates bounds automatically
          return;
        }

        const dt = delta / 1000;
        this.runTimeMs += delta;
        
        let newTier = Math.floor(this.runTimeMs / 6000);
        if (newTier > this.currentSpeedTier && this.worldSpeed < 1000) {
            this.currentSpeedTier = newTier;
            
            // Flash speed alert
            this.speedAlert.setAlpha(1);
            this.speedAlert.setScale(1);
            this.tweens.killTweensOf(this.speedAlert);
            this.tweens.add({
              targets: this.speedAlert,
              alpha: 0,
              scale: 1.1,
              duration: 2500,
              ease: "Sine.easeOut"
            });
            this.cameras.main.shake(200, 0.002);
            
            // Sabotage alarm for 1.5 seconds - Safe Play
            if (this.cache.audio.exists('sfx_sabotage')) {
                let sabot = this.sound.add('sfx_sabotage', { volume: 0.7 });
                sabot.play();
                this.time.delayedCall(1500, () => {
                    if(sabot) sabot.stop();
                });
            }
        }
        
        // Dynamic game flow - gets intensely fast towards 5km
        this.worldSpeed = Math.min(1000, 350 + newTier * 25);
        this.speedText.setText(`SPEED: ${this.worldSpeed} MPH`);

        // Physics logic bounds
        const grounded = this.playerBody.blocked.down || this.playerBody.touching.down;
        this.jumpQueuedMs += delta;

        // Touch Input bridging
        let touchSlide = false;
        if (this.input.activePointer.isDown) {
            if (this.input.activePointer.x < GAME_WIDTH / 2) {
                touchSlide = true; // Left side of screen triggers slide
            } else if (this.jumpQueuedMs > 300) {
                this.jumpQueuedMs = 0; // Right side triggers jump
            }
        }

        if (this.jumpQueuedMs <= 150 && grounded && !this.isSliding) {
          this.playerBody.setVelocityY(-760); // Jump arc adjusted for the taller body height
          this.jumpQueuedMs = 9999;
          
          let poof = this.add.circle(this.player.x, GROUND_TOP, 15, 0x00ffff, 0.5).setDepth(21);
          this.tweens.add({targets: poof, scale: 3, alpha: 0, duration: 300, onComplete:()=>poof.destroy()});
        }

        // Sliding State toggle
        const wantsToSlide = touchSlide || this.cursors.down.isDown || this.keyS.isDown;
        if (wantsToSlide && grounded) {
            if (!this.isSliding) {
                this.isSliding = true;
                this.playerBody.setSize(24, 40);
                this.player.y += 20; // push geometry box down to maintain floor constraint
            }
        } else {
            if (this.isSliding) {
                this.isSliding = false;
                this.playerBody.setSize(24, 80);
                this.player.y -= 20; // restore upright geometry 
            }
        }

        // Lock X position
        this.player.x = PLAYER_X; 
        this.playerBody.velocity.x = 0;

        // Sync Container position precisely
        if (this.isSliding) {
           this.playerVisual.setPosition(this.player.x, this.player.y - 12); // visually lowered shift
        } else {
           this.playerVisual.setPosition(this.player.x, this.player.y - 9);
        }

        // ---- SKELETAL SINE WAVE ANIMATION LOGIC ---- 
        const speedFactor = this.worldSpeed / 300;
        const t = this.runTimeMs * 0.012 * speedFactor;
        
        if (this.isSliding) {
            // Action Crouch/Slide Pose
            this.playerVisual.angle = 20; // Lean forward athletically
            
            this.fLeg.angle = -70;
            this.fLegLower.angle = 130; // Front knee high/bent
            this.bLeg.angle = 40;
            this.bLegLower.angle = 20; // Back knee low/trailing
            this.fArm.angle = 80;
            this.fArmLower.angle = -40; // Arm swept backward
            this.bArm.angle = -120;
            this.bArmLower.angle = 0; // Arm reaching forward
            this.torso.y = -10;
            this.head.y = -20;
            
            // Generate friction sparks from sliding feet
            if (Math.random() > 0.4) {
                let spark = this.add.circle(this.player.x + 10, GROUND_TOP - 2, 2.5, 0x00ffff).setDepth(21);
                this.tweens.add({targets:spark, y:"-=15", x:"-=25", alpha:0, duration:300, onComplete:()=>spark.destroy()});
            }
        } else if (grounded) {
            // Running Cycle
            const s1 = Math.sin(t);
            const c1 = Math.cos(t);
            // Legs swing
            this.fLeg.angle = s1 * 40;
            this.fLegLower.angle = Math.max(0, -s1 * 50 + 25);
            this.bLeg.angle = -s1 * 40;
            this.bLegLower.angle = Math.max(0, s1 * 50 + 25);
            // Arms swing opposingly
            this.fArm.angle = -s1 * 45;
            this.fArmLower.angle = Math.max(-100, -50 + s1 * 40);
            this.bArm.angle = s1 * 45;
            this.bArmLower.angle = Math.max(-100, -50 - s1 * 40);
            
            // Core breathing / bobbing
            this.torso.y = -15 + Math.abs(c1) * 6;
            this.head.y = -25 + Math.abs(c1) * 6;
            this.playerVisual.angle = 12; // Athletic forward lean
        } else {
            // Airborne Pose
            this.fLeg.angle = -35;
            this.fLegLower.angle = 80;
            this.bLeg.angle = 20;
            this.bLegLower.angle = 10;
            this.fArm.angle = -110;
            this.fArmLower.angle = -20;
            this.bArm.angle = 60;
            this.bArmLower.angle = -30;
            this.torso.y = -15;
            this.head.y = -25;
            this.playerVisual.angle = 0; // Straighten up
        }

        // Environment Scroll
        // Starfield panning
        for(let s of this.stars) {
           s.x -= s.speed * dt * this.worldSpeed * 0.04;
           if(s.x < -10) { s.x = GAME_WIDTH + 10; s.y = Phaser.Math.Between(0, GROUND_TOP-50); }
        }
        
        if (!this.terminalActive) {
            this.farCity.tilePositionX += this.worldSpeed * dt * 0.15;
            this.midCity.tilePositionX += this.worldSpeed * dt * 0.4;
            this.groundVisual.tilePositionX += this.worldSpeed * dt * 1.2;
        }

        // Distance & UI processing
        const travelPx = this.terminalActive ? 0 : (this.worldSpeed * dt);
        this.distance += travelPx / 10;
        if (this.distance > TARGET_DISTANCE) this.distance = TARGET_DISTANCE;

        // --- SECURITY SIGN SPAWNING ---
        for (let i=0; i<this.signMarkers.length; i++) {
            if (this.distance >= this.signMarkers[i] && !this.signsSpawned[i]) {
                this.signsSpawned[i] = true;
                this.spawnSecuritySign(i);
            }
        }

        // --- MANAGE SECURITY SIGNS ---
        for (let i = this.securitySigns.length - 1; i >= 0; i--) {
            let s = this.securitySigns[i];
            s.cont.x -= travelPx;
            if (s.cont.x < -200) {
                s.cont.destroy();
                this.securitySigns.splice(i, 1);
            }
        }
        
        this.distanceText.setText(`DIST: ${this.distance.toFixed(1)} M`);
        
        // Clean responsive progress bar rendering
        const fillW = 196 * Phaser.Math.Clamp(this.distance / TARGET_DISTANCE, 0, 1);
        this.progressBar.clear();
        this.progressBar.fillStyle(this.distance > TARGET_DISTANCE * 0.8 ? 0xff00aa : 0x00ffff, 0.9);
        this.progressBar.fillRect((GAME_WIDTH/2 - 100) + 2, 27, fillW, 11);

        // Milestones
        if (this.distance >= this.nextMilestone && this.nextMilestone <= TARGET_DISTANCE) {
          this.showMilestone();
          this.nextMilestone += 1000;
        }

        // --- ENDGAME TRANSITION ---
        if (this.distance >= TARGET_DISTANCE && !this.portalSpawned) {
          this.portalSpawned = true;
          // Spawn the physical Exit Portal
          this.finishPortal = this.add.sprite(GAME_WIDTH + 150, GROUND_TOP, 'finishPortal').setOrigin(0.5, 1).setDepth(15);
          this.physics.add.existing(this.finishPortal);
          this.finishPortal.body.setAllowGravity(false);
          this.finishPortal.body.setImmovable(true);
          
          this.portalText = this.add.text(GAME_WIDTH + 150, GROUND_TOP - 200, "EXIT", {
              fontFamily: "Orbitron, sans-serif",
              fontSize: "32px",
              fontStyle: "900",
              color: "#00ffff"
          }).setOrigin(0.5).setDepth(16).setShadow(0, 0, "#00ffff", 15, true, true);

          // Notification
          this.showSpawnAlert("EXIT PORTAL DETECTED");
        }

        if (this.portalSpawned && this.finishPortal && !this.portalReached) {
            this.finishPortal.x -= travelPx;
            this.portalText.x = this.finishPortal.x;
            this.finishPortal.body.reset(this.finishPortal.x, this.finishPortal.y);

            // Check for player entry
            if (Phaser.Geom.Intersects.RectangleToRectangle(this.player.getBounds(), this.finishPortal.getBounds())) {
                this.portalReached = true;
                this.startTerminalTask();
            }
        }
        
        // Obstacle Spawner - Suppressed in home stretch
        this.spawnProgressPx += travelPx;
        if (this.spawnProgressPx >= this.nextSpawnGap && this.distance < TARGET_DISTANCE - 150) {
          let spannedWidth = this.spawnObstacle();
          this.spawnProgressPx = 0;
          // As speed increases, randomize gaps tightly
          let minGap = 500 + (this.worldSpeed * 0.5);
          let maxGap = 1100 + (this.worldSpeed * 1.5);
          this.nextSpawnGap = spannedWidth + Phaser.Math.Between(minGap, maxGap);
        }

        // Obstacle Management
        for (let i = this.obstacles.length - 1; i >= 0; i--) {
          const o = this.obstacles[i];
          o.sprite.x -= travelPx;
          o.label.x = o.sprite.x;
          
          if (o.sprite.body) {
            o.sprite.body.reset(o.sprite.x, o.sprite.y);
          }
          
          // Random premium trail sparks on obstacles
          if(Math.random() > 0.7) {
             let trail = this.add.circle(o.sprite.x + Phaser.Math.Between(-20, 20), o.sprite.y - Phaser.Math.Between(10, o.sprite.displayHeight), 2, 0x00ffff).setDepth(20);
             this.tweens.add({targets:trail, alpha:0, y:"-=30", duration:400, onComplete:()=>trail.destroy()});
          }

          if (o.sprite.x < -150) {
            o.label.destroy();
            o.sprite.destroy();
            this.obstacles.splice(i, 1);
          }
        }
      }

      spawnSecuritySign(index) {
          const cont = this.add.container(GAME_WIDTH + 100, GROUND_TOP - 70);
          const bg = this.add.sprite(0, 0, 'dataSign').setOrigin(0.5, 1);
          const digit = this.add.text(0, -65, this.securityCode[index], {
              fontFamily: "Orbitron, sans-serif",
              fontSize: "42px",
              fontStyle: "900",
              color: "#00ffff"
          }).setOrigin(0.5);
          
          cont.add([bg, digit]);
          cont.setDepth(15);
          this.securitySigns.push({ cont: cont });
      }

      startTerminalTask() {
          this.terminalActive = true;
          this.terminalTimer = 15; // 15 seconds limit
          this.terminalAttempt = [];
          
          // Darken background
          const overlay = this.add.rectangle(GAME_WIDTH/2, GAME_HEIGHT/2, GAME_WIDTH, GAME_HEIGHT, 0x000000, 0.75).setDepth(200);
          this.terminalElements.push(overlay);
          
          // Terminal Frame
          const frame = this.add.rectangle(GAME_WIDTH/2, GAME_HEIGHT/2, 450, 600, 0x050011, 1).setDepth(201);
          const border = this.add.graphics();
          border.lineStyle(4, 0x00ffff, 1);
          border.strokeRect(GAME_WIDTH/2 - 225, GAME_HEIGHT/2 - 300, 450, 600);
          border.setDepth(202);
          this.terminalElements.push(frame, border);

          const title = this.add.text(GAME_WIDTH/2, GAME_HEIGHT/2 - 270, "SECURITY OVERRIDE", {
              fontFamily: "Orbitron, sans-serif", fontSize: "24px", color: "#00ffff", fontStyle: "900"
          }).setOrigin(0.5).setDepth(202);
          
          this.terminalStatus = this.add.text(GAME_WIDTH/2, GAME_HEIGHT/2 - 230, "ENTER 4-DIGIT SEQUENCE", {
              fontFamily: "Orbitron, sans-serif", fontSize: "16px", color: "#aaaaaa"
          }).setOrigin(0.5).setDepth(202);

          // Indicator Lights
          this.indicators = [];
          for(let i=0; i<4; i++) {
              let circ = this.add.circle(GAME_WIDTH/2 - 60 + i*40, GAME_HEIGHT/2 - 190, 8, 0x333333).setDepth(202);
              this.indicators.push(circ);
          }
          this.terminalElements.push(title, this.terminalStatus, ...this.indicators);

          // Countdown Bar
          this.timeBar = this.add.graphics().setDepth(202);
          this.terminalElements.push(this.timeBar);

          // Keypad 1-9 then 0
          const digits = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0];
          for(let i=0; i<digits.length; i++) {
              let row = Math.floor(i / 3);
              let col = i % 3;
              if (i === 9) { col = 1; row = 3; } // Center the 0
              
              let bx = GAME_WIDTH/2 - 100 + col * 100;
              let by = GAME_HEIGHT/2 - 100 + row * 100;
              
              let btn = this.add.sprite(bx, by, 'keypadSquare').setInteractive({ useHandCursor: true }).setDepth(203);
              let txt = this.add.text(bx, by, digits[i], {
                  fontFamily: "Orbitron, sans-serif", fontSize: "32px", color: "#ffffff", fontStyle: "900"
              }).setOrigin(0.5).setDepth(204);
              
              btn.on('pointerdown', () => this.handleKeypadInput(digits[i], btn));
              this.terminalElements.push(btn, txt);
          }

          // Timer Event
          this.countdownEvent = this.time.addEvent({
              delay: 100,
              repeat: 151,
              callback: () => {
                  this.terminalTimer -= 0.1;
                  this.updateTimeBar();
                  if (this.terminalTimer <= 0) this.failTerminal();
              }
          });
      }

      updateTimeBar() {
          this.timeBar.clear();
          const p = Phaser.Math.Clamp(this.terminalTimer / 15, 0, 1);
          const color = p > 0.3 ? 0x00ffff : 0xff0044;
          this.timeBar.fillStyle(color, 1);
          this.timeBar.fillRect(GAME_WIDTH/2 - 180, GAME_HEIGHT/2 + 250, 360 * p, 10);
      }

      handleKeypadInput(digit, btn) {
          if (this.keypadLocked) return;
          
          const correctDigit = this.securityCode[this.terminalAttempt.length];
          
          if (digit === correctDigit) {
              // Success
              this.terminalAttempt.push(digit);
              btn.setTint(0x00ff00);
              this.indicators[this.terminalAttempt.length - 1].setFillStyle(0x00ff00);
              
              if (this.terminalAttempt.length === 4) {
                  this.successTerminal();
              }
          } else {
              // Penalty
              this.keypadLocked = true;
              btn.setTint(0xff0000);
              this.cameras.main.shake(300, 0.015);
              if (this.cache.audio.exists('sfx_sabotage')) {
                  this.sound.play('sfx_sabotage', { volume: 0.8 });
              }
              
              this.time.delayedCall(1000, () => {
                  this.resetTerminal();
              });
          }
      }

      resetTerminal() {
          this.terminalAttempt = [];
          this.keypadLocked = false;
          // Reset button tints
          this.terminalElements.forEach(el => {
              if (el.texture && el.texture.key === 'keypadSquare') el.clearTint();
          });
          // Reset indicators
          this.indicators.forEach(ind => ind.setFillStyle(0x333333));
          this.terminalStatus.setText("SEQUENCE RESET - TRY AGAIN");
          this.terminalStatus.setColor("#ff0044");
      }

      successTerminal() {
          this.keypadLocked = true;
          this.countdownEvent.remove();
          this.terminalStatus.setText("OVERRIDE SUCCESS");
          this.terminalStatus.setColor("#00ff00");
          
          this.time.delayedCall(1000, () => {
              // Cleanup Terminal UI
              this.terminalElements.forEach(el => el.destroy());
              this.terminalActive = false; // Background music resumes flow logic
              
              // Cinematic: Escape
              this.ending = true;
              this.physics.pause();
              
              // Open Portal energy (fade out the sprite slightly or just have player pass it)
              this.tweens.add({
                  targets: this.finishPortal,
                  alpha: 0.3,
                  duration: 500
              });

              this.tweens.add({
                  targets: this.playerVisual,
                  x: GAME_WIDTH + 200,
                  duration: 2000,
                  ease: "Sine.easeIn",
                  onComplete: () => {
                      const best = saveBestDistance(this.distance);
                      this.scene.start("WinScene", { bestDistance: best });
                  }
              });
          });
      }

      failTerminal() {
          this.keypadLocked = true;
          this.countdownEvent.remove();
          this.terminalStatus.setText("SYSTEM COMPROMISED");
          this.terminalStatus.setColor("#ff0000");

          this.time.delayedCall(1000, () => {
              this.terminalElements.forEach(el => el.destroy());
              this.terminalActive = false;
              this.ending = true;
              
              // Randomly pick an elimination ending
              if (Math.random() > 0.5) {
                  this.endingSnipe();
              } else {
                  this.endingDissolve();
              }
          });
      }

      endingSnipe() {
          // Player starts to run but gets sniped
          this.tweens.add({
              targets: this.playerVisual,
              x: PLAYER_X + 150,
              duration: 800,
              ease: "Sine.easeOut",
              onComplete: () => {
                  // Red Laser from top right
                  const laser = this.add.graphics().setDepth(1000);
                  laser.lineStyle(2, 0xff0000, 1);
                  laser.beginPath();
                  laser.moveTo(GAME_WIDTH, 0);
                  laser.lineTo(this.playerVisual.x, this.playerVisual.y - 20);
                  laser.strokePath();
                  
                  this.cameras.main.flash(50, 255, 255, 255);
                  if (this.cache.audio.exists('sfx_kill')) this.sound.play('sfx_kill');
                  
                  this.cameras.main.shake(200, 0.02);
                  
                  this.time.delayedCall(100, () => {
                      laser.destroy();
                      // Digital glitch out
                      this.tweens.add({
                          targets: this.playerVisual,
                          alpha: 0,
                          scale: 0.5,
                          duration: 400,
                          onComplete: () => {
                              this.scene.start("DeathScene", { distance: this.distance, bestDistance: getBestDistance() });
                          }
                      });
                  });
              }
          });
      }

      endingDissolve() {
          // Player starts to run but dissolves into particles
          this.tweens.add({
              targets: this.playerVisual,
              x: PLAYER_X + 100,
              duration: 500,
              ease: "Sine.easeOut",
              onComplete: () => {
                  if (this.cache.audio.exists('sfx_sabotage')) this.sound.play('sfx_sabotage');
                  
                  // Intense Digital Dissolve Effect
                  this.cameras.main.shake(500, 0.01);
                  
                  const particles = this.add.particles(0, 0, 'confetti_piece', {
                      x: this.playerVisual.x,
                      y: this.playerVisual.y - 30,
                      speed: { min: 100, max: 400 },
                      angle: { min: 0, max: 360 },
                      scale: { start: 2, end: 0 },
                      alpha: { start: 1, end: 0 },
                      tint: 0x00ffff,
                      lifespan: 1000,
                      blendMode: 'ADD',
                      quantity: 40
                  });
                  particles.setDepth(1000);
                  particles.explode();

                  this.tweens.add({
                      targets: this.playerVisual,
                      scaleX: 3,
                      scaleY: 0,
                      alpha: 0,
                      duration: 300,
                      onComplete: () => {
                          this.time.delayedCall(1000, () => {
                              this.scene.start("DeathScene", { distance: this.distance, bestDistance: getBestDistance() });
                          });
                      }
                  });
              }
          });
      }
    }
    class DeathScene extends Phaser.Scene {
      constructor() {
        super("DeathScene");
      }

      preload() {
        this.load.audio('music_drip', 'assets/sounds/music_drip.mp3');
      }

      create(data) {
        this.cameras.main.setBackgroundColor("#110005");
        const dist = data && typeof data.distance === "number" ? data.distance : 0;
        const best = data && typeof data.bestDistance === "number" ? data.bestDistance : getBestDistance();

        // Warning scanlines 
        for(let i=0; i<GAME_HEIGHT; i+=8) {
            this.add.rectangle(GAME_WIDTH/2, i, GAME_WIDTH, 2, 0xff0000, 0.05);
        }

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.28, "SYSTEM OVERRIDE", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "68px",
          fontStyle: "900",
          color: "#ff0033"
        }).setOrigin(0.5).setShadow(0, 0, "#ff0000", 25, true, true);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.42, `CONNECTION LOST AT: ${dist.toFixed(1)} M`, {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "28px",
          color: "#ffffff"
        }).setOrigin(0.5);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.50, `MAX RANGE DOCUMENTED: ${best.toFixed(1)} M`, {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "20px",
          color: "#999999"
        }).setOrigin(0.5);

        const lines = [
          "YOU HAVE BEEN ASSIMILATED INTO OHIO.",
          "INSUFFICIENT EVASION VELOCITY.",
          "ANOMALY HAS OVERTAKEN THE HOST.",
          "CRITICAL EXISTENCE FAILURE."
        ];
        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.65, Phaser.Utils.Array.GetRandom(lines), {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "24px",
          fontStyle: "700",
          color: "#ff00aa"
        }).setOrigin(0.5).setShadow(0, 0, "#ff00aa", 10, true, true);

        const prompt = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.82, "[ PRESS SPACE TO REBOOT SEQUENCE ]", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "24px",
          fontStyle: "900",
          color: "#ffffff"
        }).setOrigin(0.5);

        this.tweens.add({
          targets: prompt,
          alpha: 0.1,
          duration: 500,
          yoyo: true,
          repeat: -1
        });

        this.started = false;
        this.retry = () => {
          if (this.started) return;
          this.started = true;
          this.cameras.main.fadeOut(200, 0, 0, 0);
          this.cameras.main.once('camerafadeoutcomplete', () => {
              this.scene.start("GameScene");
          });
        };
        this.spaceKey = bindMenuInput(this, this.retry);
      }

      update() {
        if (this.spaceKey && Phaser.Input.Keyboard.JustDown(this.spaceKey)) {
          this.retry();
        }
      }
    }

    // ------------------------------------------------------------
    // Win Scene
    // ------------------------------------------------------------
    class WinScene extends Phaser.Scene {
      constructor() {
        super("WinScene");
      }

      preload() {
        this.load.audio('music_drip', 'assets/sounds/music_drip.mp3');
        this.load.audio('sfx_victory', 'assets/sounds/sfx_victory.mp3');

        // Internal texture for realistic confetti strips
        if (!this.textures.exists('confetti_piece')) {
          const g = this.make.graphics({ x: 0, y: 0, add: false });
          g.fillStyle(0xffffff, 1);
          g.fillRect(0, 0, 8, 4); // A small strip
          g.generateTexture('confetti_piece', 8, 4);
          g.destroy();
        }
      }

      create(data) {
        this.cameras.main.setBackgroundColor("#020515");
        
        // Stop background music and play victory theme - Safe Toggle
        const bgm = this.sound.get('music_drip');
        if (bgm) bgm.stop();
        
        if (this.cache.audio.exists('sfx_victory')) {
            this.sound.play('sfx_victory');
        }
        
        const best = data && typeof data.bestDistance === "number" ? data.bestDistance : getBestDistance();

        // --- Realistic Particle Confetti ---
        const emitter = this.add.particles(0, -20, 'confetti_piece', {
            x: { min: 0, max: GAME_WIDTH },
            quantity: 3,
            frequency: 50,
            lifespan: 4000,
            gravityY: 200,
            speedX: { min: -50, max: 50 },
            rotate: { min: 0, max: 360 },
            scale: { min: 0.8, max: 1.5 },
            tint: [ 0x00ffff, 0xff00aa, 0xffeb62, 0xffffff, 0x00ff00 ],
            blendMode: 'ADD'
        });
        emitter.setDepth(200);

        // Stop the "pour" after 3 seconds
        this.time.delayedCall(3000, () => {
            emitter.stop();
        });

        this.events.once("shutdown", () => {
          emitter.destroy();
        });

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.3, "OHIO BREACHED", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "76px",
          fontStyle: "900",
          color: "#00ffff"
        }).setOrigin(0.5).setShadow(0, 0, "#00deff", 25, true, true);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.45, `FINAL METRIC: 5000 M (5 KM MAX)`, {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "30px",
          fontStyle: "700",
          color: "#ffffff"
        }).setOrigin(0.5);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.55, "YOU HAVE RETURNED TO REALITY.", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "24px",
          color: "#ff00aa"
        }).setOrigin(0.5).setShadow(0, 0, "#ff00aa", 10, true, true);

        this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.65, `SYSTEM ARCHIVE RECORD: ${best.toFixed(1)} M`, {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "20px",
          color: "#aaaaaa"
        }).setOrigin(0.5);

        const prompt = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT * 0.82, "[ PRESS SPACE TO INITIATE NEW RUN ]", {
          fontFamily: "Orbitron, sans-serif",
          fontSize: "24px",
          fontStyle: "900",
          color: "#ffffff"
        }).setOrigin(0.5);

        this.tweens.add({
          targets: prompt,
          alpha: 0.1,
          duration: 600,
          yoyo: true,
          repeat: -1
        });

        this.started = false;
        this.playAgain = () => {
          if (this.started) return;
          this.started = true;
          this.cameras.main.fadeOut(300, 0, 0, 0);
          this.cameras.main.once('camerafadeoutcomplete', () => {
              this.scene.start("GameScene");
          });
        };
        this.spaceKey = bindMenuInput(this, this.playAgain);
      }

      update() {
        if (this.spaceKey && Phaser.Input.Keyboard.JustDown(this.spaceKey)) {
          this.playAgain();
        }
      }
    }

    // ------------------------------------------------------------
    // Game boot
    // ------------------------------------------------------------
    const config = {
      type: Phaser.AUTO,
      parent: "game-container",
      width: GAME_WIDTH,
      height: GAME_HEIGHT,
      backgroundColor: "#000000",
      physics: {
        default: "arcade",
        arcade: {
          gravity: { y: 0 },
          debug: false
        }
      },
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: GAME_WIDTH,
        height: GAME_HEIGHT
      },
      scene: [MenuScene, GameScene, DeathScene, WinScene]
    };

    new Phaser.Game(config);
  </script>
</body>
</html>
